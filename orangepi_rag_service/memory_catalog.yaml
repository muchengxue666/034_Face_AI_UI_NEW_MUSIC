  - id: family_members
    category: family
    title: 家庭成员
    content: |-
      大儿子：李建国，在北京工作，每月回来一次。
      大儿媳：王芳，负责每周采购。
      孙子：李小明，23岁，在上海读研究生，奶奶最牵挂他。
      孙女：李晓雨，20岁，在本市上大学，每周末回家。
      女儿：李美华，住在同一个城市，每天下班后会来看望。
