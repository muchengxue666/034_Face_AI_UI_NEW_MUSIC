  - id: health_status
    category: health
    title: 健康状况
    content: |-
      高血压确诊10年；糖尿病轻度，需要控糖。
      左膝关节炎，上下楼梯要扶扶手，不能久站。
      右眼白内障较严重，看小字要戴眼镜，眼镜放在床头柜上。
      心脏有轻微心律不齐，散步每次不超过30分钟。
    keywords:
      - 高血压
      - 糖尿病
      - 膝盖
      - 白内障
      - 心律不齐
    source: catalog
    priority: 100
    is_active: true
  - id: medication_schedule
    category: medication
    title: 用药记录
    content: |-
      早上7:00：硝苯地平缓释片1片，温水送服。
      早上7:30：二甲双胍1片，随餐服用。
      晚上7:00：阿司匹林肠溶片1片，饭后服用。
      药放在厨房灶台旁边的小篮子里，红色盖子是降压药，白色盖子是降糖药。
    keywords:
      - 吃药
      - 硝苯地平
      - 二甲双胍
      - 阿司匹林
      - 药篮
    source: catalog
    priority: 100
    is_active: true
  - id: diet_preference
    category: diet
    title: 饮食习惯
    content: |-
      早餐喜欢小米粥配鸡蛋，偶尔吃馒头。
      午餐清淡，最爱红烧豆腐和清炒时蔬。
      晚餐少食七分饱，不喜欢油腻。
      喜欢嗑瓜子但不能多吃；不能吃西柚，少吃腌制食品。
    keywords:
      - 早餐
      - 小米粥
      - 西柚
      - 忌口
      - 红烧豆腐
    source: catalog
    priority: 88
    is_active: true
  - id: routine_daily
    category: routine
    title: 作息时间
    content: |-
      早上6:30起床，7:00到7:30吃早饭。
      中午12:00到14:00午睡，不要打扰。
      下午喜欢看戏曲频道和新闻联播，也会下楼和张大妈聊天。
      晚饭17:30到18:00，睡前泡脚15分钟，21:00左右就寝。
    keywords:
      - 起床
      - 午睡
      - 晚饭
      - 泡脚
      - 就寝
    source: catalog
    priority: 92
    is_active: true
  - id: preference_hobby
    category: preference
    title: 兴趣爱好
    content: |-
      最喜欢京剧，特别是《霸王别姬》和《锁麟囊》。
      喜欢和邻居张大妈聊天。
      以前会打麻将，现在因为眼睛不好打得少了。
      喜欢养花，阳台上的月季和茉莉每两天浇一次水。
    keywords:
