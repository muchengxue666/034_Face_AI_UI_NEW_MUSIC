    category: safety
    title: 特别提醒
    content: |-
      奶奶耳朵有点背，说话要稍微大声一点，但不要喊。
      奶奶常说“我没事”，要多观察状态。
      如果奶奶说头晕，要立刻让她坐下量血压；超过180/100要叫救护车。
      奶奶最牵挂在上海的孙子小明，经常会问他有没有吃饭。
